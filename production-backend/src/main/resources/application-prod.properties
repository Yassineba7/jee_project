# ── Production overrides ─────────────────────────────────────────────────────
# These values are injected via environment variables in Docker / cloud

spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/gestion_production?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

springdoc.swagger-ui.path=/swagger-ui.html
server.port=8080

# Allow CORS from the frontend container / cloud domain
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4000}
