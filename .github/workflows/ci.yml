name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Backend: Maven build + Docker build + Trivy scan + GHCR push
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven build
        working-directory: backend
        run: mvn clean package -DskipTests --batch-mode --no-transfer-progress

      - name: SonarQube scan (placeholder)
        run: echo "SonarQube — add SONAR_TOKEN + SONAR_HOST_URL secrets to enable"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/backend:latest \
                       -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }} \
                       ./backend

      - name: Trivy scan — backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/backend:latest
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push backend image
        if: github.event_name == 'push'
        run: |
          docker push ghcr.io/${{ github.repository }}/backend:latest
          docker push ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — Frontend: npm build + Docker build + Trivy scan + GHCR push
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Angular build
        working-directory: frontend
        run: npm run build

      - name: SonarQube scan (placeholder)
        run: echo "SonarQube — add SONAR_TOKEN + SONAR_HOST_URL secrets to enable"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/frontend:latest \
                       -t ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} \
                       ./frontend

      - name: Trivy scan — frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/frontend:latest
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push frontend image
        if: github.event_name == 'push'
        run: |
          docker push ghcr.io/${{ github.repository }}/frontend:latest
          docker push ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to GKE (skipped — add GCP_SA_KEY secret to enable)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: false   # Change to: github.event_name == 'push' && github.ref == 'refs/heads/main'
                # once GCP_SA_KEY secret is configured

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure kubectl
        run: |
          gcloud container clusters get-credentials gestion-production-cluster \
            --zone europe-west1-b \
            --project jeeapplication-494610

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/secrets.yml
          kubectl apply -f k8s/mysql-deployment.yml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/frontend-deployment.yml
          kubectl rollout restart deployment/backend -n gestion-production
          kubectl rollout restart deployment/frontend -n gestion-production
          kubectl rollout status deployment/backend -n gestion-production
          kubectl rollout status deployment/frontend -n gestion-production
