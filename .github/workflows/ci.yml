name: CI/CD Pipeline — Industrialization

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/gestion-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/gestion-frontend

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Backend: Build + Test + SonarQube + Trivy + Docker Push
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Analyze
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history required for SonarQube

      # 2. JDK Setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Maven Build & Tests
      - name: Build with Maven
        working-directory: backend
        run: mvn clean package -DskipTests=false --batch-mode --no-transfer-progress

      # 4. SonarQube Scan (placeholder — configure SONAR_TOKEN in repo secrets)
      - name: SonarQube Scan
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=gestion-backend \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            --batch-mode --no-transfer-progress
        continue-on-error: true   # Remove this line once SonarQube is configured

      # 5. Docker Build — Backend
      - name: Build Docker image (backend)
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            ./backend

      # 6. Trivy Security Scan — Backend image
      - name: Trivy scan — Backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:latest
          format: table
          exit-code: '0'           # Set to '1' to fail pipeline on HIGH/CRITICAL
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # 7. Docker Push — Backend
      - name: Push Docker image (backend)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
          docker push ${{ env.BACKEND_IMAGE }}:latest
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Frontend: Build + Trivy + Docker Push
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Build & Analyze
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Node.js Setup
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Install dependencies
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      # 4. Angular Build (production)
      - name: Build Angular app
        working-directory: frontend
        run: npm run build

      # 5. SonarQube Scan — Frontend (placeholder)
      - name: SonarQube Scan (frontend)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          echo "SonarQube frontend scan — configure sonar-project.properties to enable"
          # npx sonar-scanner \
          #   -Dsonar.projectKey=gestion-frontend \
          #   -Dsonar.sources=frontend/src \
          #   -Dsonar.host.url=$SONAR_HOST_URL \
          #   -Dsonar.login=$SONAR_TOKEN
        continue-on-error: true

      # 6. Docker Build — Frontend
      - name: Build Docker image (frontend)
        run: |
          docker build \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            ./frontend

      # 7. Trivy Security Scan — Frontend image
      - name: Trivy scan — Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:latest
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # 8. Docker Push — Frontend
      - name: Push Docker image (frontend)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
          docker push ${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to GKE (only on main branch push)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure kubectl
        run: |
          gcloud container clusters get-credentials gestion-production-cluster \
            --zone europe-west1-b \
            --project jeeapplication-494610

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/secrets.yml
          kubectl apply -f k8s/mysql-deployment.yml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/frontend-deployment.yml
          kubectl rollout restart deployment/backend -n gestion-production
          kubectl rollout restart deployment/frontend -n gestion-production
          kubectl rollout status deployment/backend -n gestion-production
          kubectl rollout status deployment/frontend -n gestion-production
