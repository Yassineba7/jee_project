name: CI/CD Pipeline — Industrialization

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # Use GHCR (no secrets needed) — falls back gracefully if Docker Hub not set
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Backend: Build + Test + SonarQube + Trivy + Docker Push
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. JDK Setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Maven Build & Tests
      - name: Build with Maven
        working-directory: backend
        run: mvn clean package -DskipTests --batch-mode --no-transfer-progress

      # 4. SonarQube Scan (skipped if secrets not configured)
      - name: SonarQube Scan
        working-directory: backend
        if: ${{ secrets.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=gestion-backend \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            --batch-mode --no-transfer-progress
        continue-on-error: true

      # 5. Login to GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Docker Build — Backend
      - name: Build Docker image (backend)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          load: true

      # 7. Trivy Security Scan — Backend image
      - name: Trivy scan — Backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:latest
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # 8. Docker Push — Backend (only on main push)
      - name: Push Docker image (backend)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:latest
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Frontend: Build + Trivy + Docker Push
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Build & Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Node.js Setup
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Install dependencies
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      # 4. Angular Build (production)
      - name: Build Angular app
        working-directory: frontend
        run: npm run build

      # 5. SonarQube Scan (skipped if secrets not configured)
      - name: SonarQube Scan (frontend)
        if: ${{ secrets.SONAR_TOKEN != '' }}
        run: |
          echo "SonarQube scan skipped — add SONAR_TOKEN secret to enable"
        continue-on-error: true

      # 6. Login to GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 7. Docker Build — Frontend
      - name: Build Docker image (frontend)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          load: true

      # 8. Trivy Security Scan — Frontend image
      - name: Trivy scan — Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:latest
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # 9. Docker Push — Frontend (only on main push)
      - name: Push Docker image (frontend)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to GKE (only if GCP_SA_KEY secret is configured)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.GCP_SA_KEY != ''

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure kubectl
        run: |
          gcloud container clusters get-credentials gestion-production-cluster \
            --zone europe-west1-b \
            --project jeeapplication-494610

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/secrets.yml
          kubectl apply -f k8s/mysql-deployment.yml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/frontend-deployment.yml
          kubectl rollout restart deployment/backend -n gestion-production
          kubectl rollout restart deployment/frontend -n gestion-production
          kubectl rollout status deployment/backend -n gestion-production
          kubectl rollout status deployment/frontend -n gestion-production
