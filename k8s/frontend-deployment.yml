apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: gestion-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/jeeapplication-494610/frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: PORT
              value: "80"
            - name: BACKEND_URL
              value: "http://backend:8080"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: gestion-production
spec:
  selector:
    app: frontend
  type: LoadBalancer       # GKE crée automatiquement une IP publique
  ports:
    - port: 80
      targetPort: 80
